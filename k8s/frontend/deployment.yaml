apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: pizza-corrida-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
          envFrom:
            - configMapRef:
                name: frontend-config
          readinessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 5
